<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Công trình Minecraft</title>

<style>
body{
    background:#202124;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#55ff55;
}

.card{
    background:#2f2f2f;
    margin:20px auto;
    width:80%;
    padding:20px;
    border-radius:15px;
}

a{
    color:#55ff55;
    text-decoration:none;
}
</style>

</head>

<body>

<h1>🏰 Công trình Minecraft</h1>

<div class="card">
<h2>🏘️ Village</h2>
<p>Làng của dân làng, có thể tìm thấy thức ăn và trao đổi đồ.</p>
</div>

<div class="card">
<h2>🏛️ Ancient City</h2>
<p>Thành phố cổ dưới lòng đất, nơi có Warden rất nguy hiểm.</p>
</div>

<div class="card">
<h2>🔥 Nether Fortress</h2>
<p>Nơi tìm Blaze Rod và Nether Wart.</p>
</div>

<div class="card">
<h2>🐉 End City</h2>
<p>Có Elytra và nhiều kho báu quý.</p>
</div>
